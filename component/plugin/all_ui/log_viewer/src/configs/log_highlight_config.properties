#该设置表示日志组合窗口的最小等级
log.logview.all.min-level = debug
log.logview.all.format = [#{datetime}][#{cat}][#{level}][#{class}][#{line}]: #{content}
log.logview.all.date-format = yyyy/MM/dd HH:mm:ss.zzz
log.logview.all.color-reg = ^(\[\d{4}/\d{2}/\d{2} \d{2}\:\d{2}\:\d{2}\.\d{3}\])(\[\S+\])(\[\S+\])(\[\S+\])(\[\S+\])
